workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-9.3.1/bin/gradle assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
