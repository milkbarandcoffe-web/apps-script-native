workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          export ANDROID_HOME=$HOME/programs/android-sdk
          gradle assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
